{% extends 'base.html' %}

{% block content %}
<form class="row g-3">
    <div class="col-md-6">
        <label for="product_name" class="form-label">Product Name</label>
        <input type="text" class="form-control" id="product_name">
    </div>
    <div class="col-md-3">
        <label for="min_price" class="form-label">Min Price</label>
        <input type="number" class="form-control" id="min_price">
    </div>
    <div class="col-md-3">
        <label for="max_price" class="form-label">Max Price</label>
        <input type="number" class="form-control" id="max_price">
    </div>
    <div class="col-6">
        <label for="inputAddress" class="form-label">Address</label>
        <input type="text" class="form-control" id="inputAddress" placeholder="1234 Main St">
    </div>
    <div class="col-md-6">
        <label for="inputState" class="form-label">Category</label>
        <select id="inputState" class="form-select">
            <option selected>Choose...</option>
            <option>Clothes</option>
            <option>Shoes</option>
            <option>Acsesories</option>
            <option>Camping</option>
            <option>Electronics</option>
        </select>
    </div>
    <div class="col-12">
        <button type="submit" class="btn btn-primary">Sign in</button>
    </div>
</form>

<div class="row row-cols-4 mt-4 g-4">
    {% for product in products %}
    <div class="col">
        <div class="card" style="width: 18rem;">
            <img src="https://steamuserimages-a.akamaihd.net/ugc/1676988590204792260/EA31EB30D4B962E9732DE2F0DC556D8267920315/?imw=512&&ima=fit&impolicy=Letterbox&imcolor=%23000000&letterbox=false" class="card-img-top" alt="...">
            <div class="card-body">
                <h5 class="card-title">{{product_name}}</h5>
                <p class="card-text">{{product_description}}</p>
                <a href="#" class="btn btn-primary">Go somewhere</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

{% endblock %}
